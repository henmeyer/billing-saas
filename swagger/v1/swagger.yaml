---
openapi: 3.0.1
info:
  title: Billing SaaS API
  description: |
    API de integração da plataforma de billing.

    ## Autenticação

    Use a **API Key da integração**, não a API Key de conta.

    ```
    Authorization: Bearer billing_int_sua_chave
    ```

    As API Keys de integração são geradas em:
    **Configurações → Integrações → [sua integração] → API Keys**

    > ⚠ API Keys de conta (`billing_...`) não funcionam nesta API.
    > Elas servem apenas para autenticar no painel.

    ## Namespace de clientes

    O `external_id` é resolvido dentro do contexto da sua integração.
    O mesmo `external_id: "1"` em duas integrações diferentes
    corresponde a clientes diferentes.

    ## Idempotência

    O endpoint de `report` é idempotente — envie o **total acumulado**,
    não o incremento. Isso garante que retries não causem duplicação.

    ## Webhooks de saída

    Configure integrações no painel para receber eventos em tempo real.
    Todos os payloads são assinados com `X-Billing-Signature: sha256=...`.
  version: v1
  contact:
    name: Suporte
    email: suporte@billing.com
servers:
- url: "{protocol}://{host}"
  description: Servidor configurável
  variables:
    protocol:
      default: https
      enum:
      - https
      - http
    host:
      default: app.billing.com
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key gerada no painel em Configurações → API Keys
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Token inválido ou expirado
    CurrencyInfo:
      type: object
      properties:
        code:
          type: string
          example: BRL
        symbol:
          type: string
          example: R$
    CreditBalance:
      type: object
      properties:
        used:
          type: integer
          example: 300
        limit:
          type: integer
          example: 1000
        balance:
          type: integer
          example: 700
        usage_percent:
          type: number
          example: 30.0
        synced_at:
          type: string
          format: date-time
          example: '2026-06-01T10:00:00Z'
    CreditsResponse:
      type: object
      properties:
        customer_id:
          type: string
          example: EXT123
        credits:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/CreditBalance"
          example:
            coins:
              used: 300
              limit: 1000
              balance: 700
              usage_percent: 30.0
              synced_at: '2026-06-01T10:00:00Z'
            ai_tokens:
              used: 50000
              limit: 200000
              balance: 150000
              usage_percent: 25.0
              synced_at: '2026-06-01T10:00:00Z'
    CreditReportRequest:
      type: object
      required:
      - credit_type
      - used
      properties:
        credit_type:
          type: string
          description: 'Chave do tipo de crédito (ex: coins, ai_tokens)'
          example: coins
        used:
          type: integer
          description: Total acumulado usado no período atual (não o incremento)
          example: 450
        limit:
          type: integer
          description: Limite atual (opcional — usa o do plano se omitido)
          example: 1000
    CreditReportResponse:
      type: object
      properties:
        balance:
          type: integer
          example: 550
        usage_percent:
          type: number
          example: 45.0
        status:
          type: string
          enum:
          - ok
          - depleted
          example: ok
    LicenseInfo:
      type: object
      properties:
        allocated:
          type: integer
          nullable: true
          description: Quantidade alocada no plano. null = ilimitado
          example: 20
        used:
          type: integer
          example: 14
        available:
          type: integer
          nullable: true
          description: Disponível. null = ilimitado
          example: 6
        unlimited:
          type: boolean
          example: false
    LicensesResponse:
      type: object
      properties:
        customer_id:
          type: string
          example: EXT123
        licenses:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/LicenseInfo"
          example:
            user_licenses:
              allocated: 20
              used: 14
              available: 6
              unlimited: false
            inbox_licenses:
              allocated: 10
              used: 4
              available: 6
              unlimited: false
    LicenseReportRequest:
      type: object
      required:
      - licenses
      properties:
        licenses:
          type: object
          additionalProperties:
            type: integer
          description: Mapa de license_type_key → quantidade em uso
          example:
            user_licenses: 14
            inbox_licenses: 4
    LicenseReportResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        licenses:
          type: object
          additionalProperties:
            type: integer
          example:
            user_licenses: 14
            inbox_licenses: 4
    SubscriptionPlan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pro
        billing_cycle:
          type: string
          example: monthly
        price_cents:
          type: integer
          example: 19700
        currency:
          type: string
          example: BRL
    CustomerCreateRequest:
      type: object
      required:
      - external_id
      - name
      - email
      - document
      properties:
        external_id:
          type: string
          description: ID do cliente no seu sistema. Usado em todas as chamadas futuras.
          example: user_abc123
        name:
          type: string
          example: Acme Ltda
        email:
          type: string
          format: email
          example: billing@acme.com
        document:
          type: string
          description: CPF, CNPJ ou documento equivalente do país do cliente.
          example: 00.000.000/0001-00
        phone:
          type: string
          example: "+55 11 99999-9999"
        country:
          type: string
          description: Código ISO 3166-1 alpha-2. Usado para resolver o gateway de
            pagamento.
          example: BR
          default: BR
    CustomerResponse:
      type: object
      properties:
        external_id:
          type: string
          example: user_abc123
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Acme Ltda
        email:
          type: string
          example: billing@acme.com
        document:
          type: string
          example: 00.000.000/0001-00
        phone:
          type: string
          example: "+55 11 99999-9999"
          nullable: true
        country:
          type: string
          example: BR
        status:
          type: string
          enum:
          - active
          - suspended
          - churned
          - trial
          example: active
    SubscriptionCreateRequest:
      type: object
      required:
      - plan_id
      properties:
        plan_id:
          type: integer
          description: ID do plano a ser assinado.
          example: 1
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
          description: Se informado, a assinatura inicia como trial e converte automaticamente
            após esta data.
          example: '2026-07-15T00:00:00Z'
    SubscriptionCreateResponse:
      type: object
      properties:
        external_id:
          type: string
          example: user_abc123
        integration_id:
          type: integer
          example: 1
        plan:
          "$ref": "#/components/schemas/SubscriptionPlan"
        status:
          type: string
          enum:
          - active
          - trialing
          example: trialing
        managed_by:
          type: string
          example: billing
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-15T00:00:00Z'
        current_period_end:
          type: string
          format: date-time
          example: '2026-08-01T00:00:00Z'
        started_at:
          type: string
          format: date-time
          example: '2026-07-01T00:00:00Z'
    SubscriptionResponse:
      type: object
      properties:
        customer_id:
          type: string
          example: EXT123
        plan:
          "$ref": "#/components/schemas/SubscriptionPlan"
        status:
          type: string
          enum:
          - active
          - past_due
          - cancelled
          - trialing
          example: active
        gateway:
          type: string
          example: asaas
        current_period_end:
          type: string
          format: date-time
          example: '2026-07-01T00:00:00Z'
        started_at:
          type: string
          format: date-time
          example: '2026-01-01T00:00:00Z'
    PortalSessionResponse:
      type: object
      properties:
        url:
          type: string
          description: URL do portal com token embutido. Redirecione o cliente para
            esta URL.
          example: https://billing.app/portal/abc123def456ghi789...
        expires_in:
          type: integer
          description: Tempo de vida do link em segundos (900 = 15 minutos)
          example: 900
        expires_at:
          type: string
          format: date-time
          description: Data/hora exata de expiração do link (ISO 8601)
          example: '2026-06-10T15:30:00Z'
    WebhookCustomer:
      type: object
      properties:
        id:
          type: string
          example: '42'
        external_id:
          type: string
          example: EXT123
        name:
          type: string
          example: Empresa X
        email:
          type: string
          example: admin@empresax.com
    WebhookBase:
      type: object
      required:
      - event
      - uuid
      - timestamp
      - account_id
      - customer
      properties:
        event:
          type: string
          description: Tipo do evento
          example: payment.received
        uuid:
          type: string
          format: uuid
          description: Identificador único do disparo. Use para deduplicação e rastreamento.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        timestamp:
          type: string
          format: date-time
          example: '2026-06-01T14:30:00Z'
        account_id:
          type: string
          example: '1'
        test:
          type: boolean
          description: true quando disparado pelo botão de teste. Ignore em produção.
          example: false
        customer:
          "$ref": "#/components/schemas/WebhookCustomer"
        features:
          type: object
          description: Features habilitadas no plano atual do cliente
          additionalProperties:
            type: boolean
          example:
            ai_enabled: true
            export_reports: false
        data:
          type: object
          description: Dados específicos do evento
    WebhookSubscriptionActivated:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - subscription.activated
          data:
            type: object
            properties:
              plan:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: Pro
    WebhookSubscriptionCancelled:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - subscription.cancelled
          data:
            type: object
            example: {}
    WebhookSubscriptionPastDue:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - subscription.past_due
          data:
            type: object
            example: {}
    WebhookSubscriptionRenewed:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - subscription.renewed
          data:
            type: object
            properties:
              period_end:
                type: string
                format: date-time
                example: '2026-07-01T00:00:00Z'
    WebhookSubscriptionTrialEnding:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - subscription.trial_ending
          data:
            type: object
            properties:
              trial_ends_at:
                type: string
                format: date-time
                example: '2026-06-04T00:00:00Z'
              days_remaining:
                type: integer
                example: 3
    WebhookPlanChanged:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - plan.changed
          data:
            type: object
            properties:
              previous_plan:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: Starter
              new_plan:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2
                  name:
                    type: string
                    example: Pro
    WebhookPaymentReceived:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - payment.received
          data:
            type: object
            properties:
              amount_cents:
                type: integer
                example: 19700
              gateway:
                type: string
                example: asaas
                enum:
                - asaas
                - stripe
                - dlocal_go
              charge_id:
                type: string
                example: pay_abc123
    WebhookPaymentFailed:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - payment.failed
          data:
            type: object
            properties:
              amount_cents:
                type: integer
                example: 19700
              gateway:
                type: string
                example: stripe
              attempt:
                type: integer
                example: 1
                description: Número da tentativa de cobrança
    WebhookCreditsThresholdReached:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - credits.threshold_reached
          data:
            type: object
            properties:
              credit_type:
                type: string
                example: coins
              used:
                type: integer
                example: 800
              limit:
                type: integer
                example: 1000
              usage_percent:
                type: number
                example: 80.0
              threshold:
                type: integer
                example: 80
                enum:
                - 80
                - 95
                description: Percentual que disparou o alerta
    WebhookCreditsDepleted:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - credits.depleted
          data:
            type: object
            properties:
              credit_type:
                type: string
                example: coins
              used:
                type: integer
                example: 1000
              limit:
                type: integer
                example: 1000
              usage_percent:
                type: number
                example: 100.0
    WebhookCreditsRecharged:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - credits.recharged
          data:
            type: object
            properties:
              credit_type:
                type: string
                example: coins
              added:
                type: integer
                example: 1000
                description: Créditos adicionados
              new_balance:
                type: integer
                example: 2000
    WebhookLicenseUpdated:
      allOf:
      - "$ref": "#/components/schemas/WebhookBase"
      - type: object
        properties:
          event:
            type: string
            enum:
            - license.updated
          data:
            type: object
            properties:
              license_type:
                type: string
                example: user_licenses
              previous_quantity:
                type: integer
                example: 10
              new_quantity:
                type: integer
                example: 20
security:
- BearerAuth: []
paths:
  "/api/v1/customers/{external_id}/credits":
    parameters:
    - name: external_id
      in: path
      required: true
      description: ID externo do cliente no seu sistema
      example: EXT123
      schema:
        type: string
    get:
      summary: Consultar saldo de créditos
      tags:
      - Créditos
      security:
      - BearerAuth: []
      description: |
        Retorna o saldo atual de todos os tipos de crédito do cliente
        no período de cobrança vigente.

        O saldo é atualizado via `POST /credits/report` pelo seu sistema.
      responses:
        '200':
          description: Saldo retornado com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreditsResponse"
        '401':
          description: Token inválido ou ausente
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/customers/{external_id}/credits/report":
    parameters:
    - name: external_id
      in: path
      required: true
      description: ID externo do cliente
      example: EXT123
      schema:
        type: string
    post:
      summary: Reportar uso de créditos
      tags:
      - Créditos
      security:
      - BearerAuth: []
      description: |
        Atualiza o uso de créditos do cliente no período atual.

        **Importante:** envie o **total acumulado** usado no período,
        não o incremento. Isso torna a operação idempotente — retries
        não causam duplicação.

        **Exemplo:** se o cliente usou 200 coins ontem e mais 100 hoje,
        envie `used: 300`, não `used: 100`.

        Alertas de threshold (80%, 95%, 100%) são disparados automaticamente
        via webhook quando atingidos.
      parameters: []
      responses:
        '200':
          description: Uso registrado com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreditReportResponse"
        '404':
          description: Tipo de crédito não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Sem assinatura ativa
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreditReportRequest"
        required: true
  "/api/v1/customers":
    post:
      summary: Criar ou recuperar cliente
      tags:
      - Clientes
      security:
      - BearerAuth: []
      description: |
        Cria um cliente e vincula ao `external_id` da sua integração.

        **Idempotente:** se o `external_id` já estiver cadastrado para esta integração,
        retorna o cliente existente com status `200` sem criar duplicata.

        Se o e-mail já existir em outro cliente da conta, o `external_id` é vinculado
        a esse cliente (útil para clientes com múltiplas integrações).
      parameters: []
      responses:
        '201':
          description: Cliente criado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CustomerResponse"
        '200':
          description: Cliente já existia (idempotente)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CustomerResponse"
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    description: Mapa de campo → lista de erros
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CustomerCreateRequest"
        required: true
  "/api/v1/customers/{external_id}/licenses":
    parameters:
    - name: external_id
      in: path
      required: true
      example: EXT123
      schema:
        type: string
    get:
      summary: Consultar licenças ativas
      tags:
      - Licenças
      security:
      - BearerAuth: []
      description: |
        Retorna as licenças alocadas e em uso do cliente no plano atual.

        `allocated: null` indica licença ilimitada.
        Use `POST /licenses/report` para atualizar o uso.
      responses:
        '200':
          description: Licenças retornadas com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LicensesResponse"
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/customers/{external_id}/licenses/report":
    parameters:
    - name: external_id
      in: path
      required: true
      example: EXT123
      schema:
        type: string
    post:
      summary: Reportar uso de licenças
      tags:
      - Licenças
      security:
      - BearerAuth: []
      description: |
        Atualiza a quantidade de licenças em uso pelo cliente.

        Envie um mapa de `license_type_key → quantidade_em_uso`.
        Pode enviar apenas os tipos que mudaram.
      parameters: []
      responses:
        '200':
          description: Uso registrado com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LicenseReportResponse"
        '404':
          description: Cliente não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/LicenseReportRequest"
        required: true
  "/api/v1/portal/sessions":
    post:
      summary: Gerar magic link do portal
      tags:
      - Portal
      security:
      - BearerAuth: []
      description: |
        Gera um link temporário (15 minutos) para o cliente acessar o portal
        de autoatendimento.

        Use a API Key da integração — o portal mostrará apenas a assinatura
        vinculada a esta integração.

        ## Fluxo típico

        1. Cliente clica "Gerenciar assinatura" no seu sistema
        2. Seu backend chama este endpoint com o `external_id` do cliente
        3. Retorna uma URL expirável (15 min)
        4. Redirecione o cliente para essa URL (ou abra em nova aba)
        5. O cliente acessa o portal com sessão via cookie

        ## Configuração do portal

        O administrador configura, por integração, quais funcionalidades
        ficam disponíveis no portal:

        - **allow_plan_change** — trocar de plano (upgrade/downgrade)
        - **allow_buy_products** — comprar pacotes de créditos
        - **allow_adjust_extras** — ajustar créditos extras da assinatura
        - **show_invoice_history** — ver histórico de faturas
        - **allow_cancel** — cancelar assinatura

        Essas opções são configuráveis em:
        **Configurações → Integrações → [sua integração] → Portal do cliente**

        ## Branding

        O portal suporta personalização visual por integração:
        logo e cor primária, configuráveis no painel de administração.
      parameters: []
      responses:
        '200':
          description: Magic link gerado com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PortalSessionResponse"
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: Cliente não encontrado nesta integração
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - external_id
              properties:
                external_id:
                  type: string
                  description: ID do cliente no seu sistema (conforme cadastrado na
                    integração)
                  example: EXT123
        required: true
  "/api/v1/customers/{external_id}/subscription":
    parameters:
    - name: external_id
      in: path
      required: true
      example: EXT123
      schema:
        type: string
    get:
      summary: Consultar assinatura ativa
      tags:
      - Assinatura
      security:
      - BearerAuth: []
      description: |
        Retorna os dados da assinatura ativa do cliente, incluindo
        plano, status, moeda e data de renovação.

        Use este endpoint para verificar se um cliente tem acesso ativo
        antes de permitir operações no seu sistema.
      responses:
        '200':
