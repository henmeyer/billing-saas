    post:
      summary: Criar assinatura (trial ou ativa)
      tags:
      - Assinatura
      security:
      - BearerAuth: []
      description: |
        Cria uma assinatura para o cliente, gerenciada pelo billing (sem gateway de pagamento).

        **Trial:** informe `trial_ends_at` para iniciar em período de teste.
        A assinatura fica com status `trialing` até a data informada.
        Após a data, use o portal do cliente ou o fluxo de conversão para ativar.

        **Ativa imediatamente:** omita `trial_ends_at` para criar já com status `active`.

        Um cliente pode ter apenas uma assinatura ativa por integração.
      parameters: []
      responses:
        '201':
          description: Assinatura criada
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SubscriptionCreateResponse"
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: Cliente ou plano não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Já possui assinatura ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    description: Mapa de campo → lista de erros
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/SubscriptionCreateRequest"
        required: true
  "/webhooks/callbacks":
    get:
      summary: Documentação dos webhooks de saída
      tags:
      - Webhooks
      description: |
        ## Visão geral

        Webhooks são disparados automaticamente quando eventos ocorrem no sistema.
        Configure a URL de destino em **Configurações → Integrações**.

        ## Autenticação

        Cada webhook inclui o header:
        ```
        X-Billing-Signature: sha256=<assinatura>
        ```

        A assinatura é calculada como `HMAC-SHA256(secret, body)`.
        O `secret` é gerado automaticamente na criação da integração
        e exibido na página de configuração.

        ## Validação da assinatura

        **Ruby:**
        ```ruby
        expected = "sha256=" + OpenSSL::HMAC.hexdigest(
          "SHA256", SECRET, request.body.read
        )
        valid = ActiveSupport::SecurityUtils.secure_compare(
          expected, request.headers["X-Billing-Signature"]
        )
        ```

        **Node.js:**
        ```js
        const sig = crypto
          .createHmac('sha256', SECRET)
          .update(rawBody)
          .digest('hex')
        const valid = `sha256=${sig}` === req.headers['x-billing-signature']
        ```

        **Python:**
        ```python
        import hmac, hashlib
        sig = hmac.new(
          SECRET.encode(), raw_body, hashlib.sha256
        ).hexdigest()
        valid = f"sha256={sig}" == request.headers.get("X-Billing-Signature")
        ```

        ## Retry

        Em caso de falha (timeout ou resposta não-2xx), o sistema
        tenta novamente com backoff exponencial:
        1min → 5min → 30min → 2h → 8h (5 tentativas no total).

        **Responda com HTTP 200 imediatamente** e processe em background.

        ## Identificar testes

        Webhooks disparados pelo botão de teste incluem `"test": true` no payload.
        Você pode usar isso para ignorar em produção se necessário.

        ## Catálogo de eventos

        Selecione os eventos desejados ao configurar cada integração.
        Abaixo estão todos os eventos disponíveis com seus payloads.
      responses:
        '200':
          description: Documentação de referência
  "/webhooks/events/subscription.activated":
